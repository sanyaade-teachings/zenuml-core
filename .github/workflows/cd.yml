# Simple workflow for deploying static content to GitHub Pages
name: Build, Test, npm Publish, and Deploy

on:
  push:
    paths-ignore:
      - "docs/**"
      - "integration/**"
      - "*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "integration/**"
      - "*.md"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Test
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install
      - name: Typecheck
        # tsc -b (project references), not bare `tsc --noEmit` — the root
        # tsconfig.json has "files": [] so a bare `tsc --noEmit` checks zero
        # files and always exits 0. `-b` builds tsconfig.app.json (src) and
        # tsconfig.node.json (vite.config.ts), which is the real check.
        run: bun run typecheck
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-browsers-
      # Must run on every job, even on a Playwright browser cache hit. The cache
      # restores only the browser binary (~/.cache/ms-playwright), NOT the apt
      # system packages that `playwright install-deps` provides. The CLI PNG tests
      # measure text via @napi-rs/canvas, which reads system fonts through
      # fontconfig; without those fonts it falls back to wider metrics, changing
      # the rendered diagram width and failing the committed snapshots (which were
      # generated with fonts present). `playwright install chromium` is a fast
      # no-op when the binary is already cached, so this stays cheap.
      - name: Install Playwright Chromium + system fonts for CLI PNG tests
        run: bun run pw:install
      - name: Lint
        run: bunx eslint src
      - name: Run tests
        run: bun run test
      - name: Parser consistency gate (ANTLR vs Langium side-car)
        # The published library ships the ANTLR parser; the Langium parser
        # (src/parser-langium/) is a side-car used to generate the LSP server.
        # This diffs both engines over the whole corpus and fails on any
        # undocumented divergence, so the two parsers can never drift apart.
        run: bun run parity:dualrun
      - name: Build LSP server (side-car, ensure it compiles)
        run: bun run build:lsp

  e2e:
    uses: ./.github/workflows/e2e.yml
    permissions:
      contents: read

  # Release via Changesets.
  #
  # On every push to main this job runs the changesets action:
  #   * If unreleased changeset files exist in .changeset/, it opens (or
  #     updates) a "Version Packages" PR that bumps package.json and writes
  #     CHANGELOG.md.
  #   * When that PR is merged (no changesets left), it runs `bun run release`
  #     which builds and publishes to npm, then tags the commit and creates a
  #     GitHub Release.
  #
  # Bump levels are declared per-PR by contributors via `bun run changeset`,
  # so versioning no longer depends on parsing commit messages.
  release:
    runs-on: ubuntu-22.04
    needs: [test, e2e]
    permissions:
      contents: write # commit version bump, push tags, create releases
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm OIDC trusted publishing + provenance
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # changesets needs full history and tags
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: bun install
      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true" # publish with provenance via OIDC

  # Deploy to Cloudflare Workers
  deploy-to-cloudflare:
    runs-on: ubuntu-22.04
    needs: [test, e2e]
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun run build:site

      - name: Deploy to Cloudflare Workers (Production)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ vars.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

      - name: Deploy to Cloudflare Workers (Staging)
        id: deploy_staging # Add an ID to reference this step
        if: github.ref != 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ vars.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

      - name: Comment on PR with Staging URL
        if: github.event_name == 'pull_request' && github.ref != 'refs/heads/main'
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Staging deployment available at: https://zenuml-web-renderer-staging.${{ vars.CLOUDFLARE_ACCOUNT_ID }}.workers.dev
            (Note: The subdomain part might vary based on Cloudflare configuration.)
